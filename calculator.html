<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로봇 주행거리 계산하기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(160deg, #0d1b2a 0%, #1b2a3b 60%, #0a1a25 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      padding: 0;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* Header with robot image */
    .header {
      background: linear-gradient(135deg, #0e2a3a 0%, #0d3347 100%);
      border-bottom: 1px solid rgba(0,200,220,0.15);
      padding: 32px 40px 24px;
      text-align: center;
      position: relative;
    }

    .robot-img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      display: block;
      margin: 0 auto 16px;
      filter: drop-shadow(0 8px 24px rgba(0,200,220,0.4));
      animation: float 3s ease-in-out infinite;
    }

    /* Fallback placeholder shown only if image fails to load */
    .robot-placeholder {
      display: none;
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #00c8dc22, #c83c9622);
      border: 2px dashed rgba(0,200,220,0.3);
      border-radius: 16px;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      color: #e8f8ff;
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .subtitle {
      color: rgba(0,200,220,0.65);
      font-size: 0.82rem;
      letter-spacing: 0.3px;
    }

    /* Accent stripe: animated gradient */
    .stripe {
      height: 5px;
      background: linear-gradient(90deg, #00c8dc, #f5c800, #c83c96, #00c8dc, #f5c800, #c83c96);
      background-size: 300% 100%;
      animation: stripeFlow 3s linear infinite;
    }

    @keyframes stripeFlow {
      0%   { background-position: 0% 0%; }
      100% { background-position: 100% 0%; }
    }

    /* Body */
    .body {
      padding: 32px 36px 36px;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.55);
      font-size: 0.82rem;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .num-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,200,220,0.2);
      border-radius: 14px;
      padding: 16px 20px;
      color: #fff;
      font-size: 1.5rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      margin-bottom: 18px;
    }

    .num-input:focus {
      border-color: #00c8dc;
      background: rgba(0,200,220,0.07);
      box-shadow: 0 0 0 3px rgba(0,200,220,0.15);
    }

    .num-input::placeholder { color: rgba(255,255,255,0.2); }

    .calc-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #00b8cc, #0090a8);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,180,200,0.35);
      letter-spacing: 0.3px;
    }

    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0,180,200,0.55);
    }

    .calc-btn:active { transform: translateY(0); }

    .error-msg {
      color: #ff7b7b;
      text-align: center;
      margin-top: 12px;
      font-size: 0.88rem;
      display: none;
    }

    /* Result */
    .result-area {
      margin-top: 24px;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-box {
      background: linear-gradient(135deg, rgba(0,200,220,0.1), rgba(200,60,150,0.08));
      border: 1px solid rgba(0,200,220,0.25);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    .result-box::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(0,200,220,0.12), transparent 70%);
      pointer-events: none;
    }

    .result-label {
      color: rgba(0,200,220,0.7);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .result-value {
      color: #7ef0ff;
      font-size: 3.8rem;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
    }

    .result-unit {
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* Steps */
    .step-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 18px 20px;
    }

    .step-title {
      color: rgba(255,255,255,0.35);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .step-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255,255,255,0.7);
      font-size: 0.92rem;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .step-line:last-child { border-bottom: none; }

    .step-line .val {
      color: #7ef0ff;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      background: rgba(0,200,220,0.2);
      color: #00c8dc;
      border-radius: 6px;
      padding: 1px 8px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .reset-btn {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: rgba(255,255,255,0.38);
      font-size: 0.88rem;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <img class="robot-img" src="robot.png" alt="로봇"
           onerror="this.style.display='none'; document.querySelector('.robot-placeholder').style.display='flex';">
      <div class="robot-placeholder">🤖</div>
      <h1>로봇 주행거리 계산하기</h1>
      <p class="subtitle">출석번호를 입력하면 내 로봇의 주행거리를 알려드려요</p>
    </div>
    <div class="stripe"></div>

    <!-- Body -->
    <div class="body">
      <label>출석번호</label>
      <input class="num-input" type="number" id="numInput" placeholder="예) 15" min="1">

      <button class="calc-btn" onclick="calculate()">🚗 주행거리 확인하기</button>

      <p class="error-msg" id="error-msg"></p>

      <div class="result-area" id="result-area">
        <div class="result-box">
          <div class="result-label">내 로봇 주행거리</div>
          <div class="result-value" id="result-value">—</div>
          <div class="result-unit">cm</div>
        </div>

        <button class="reset-btn" onclick="reset()">↺ 다시 입력하기</button>
      </div>
    </div>
  </div>

  <script>
    const RULE = { 0: 13, 1: 18, 2: 23, 3: 28 };

    function calculate() {
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      const raw = document.getElementById('numInput').value.trim();
      const num = parseInt(raw, 10);

      if (raw === '' || isNaN(num) || num < 1) {
        errEl.textContent = '1 이상의 출석번호를 입력해 주세요.';
        errEl.style.display = 'block';
        return;
      }

      const remainder = num % 4;
      const result = RULE[remainder];

      document.getElementById('result-value').textContent = result;

      document.getElementById('result-area').style.display = 'block';
    }

    function reset() {
      document.getElementById('numInput').value = '';
      document.getElementById('result-area').style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  </script>
</body>
</html>
