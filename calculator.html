<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로봇 주행거리 계산하기</title>
  <style>
    /* =============================================
       기본 초기화 및 전체 레이아웃
       모든 요소의 여백과 테두리 계산 방식 통일
    ============================================= */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* 페이지 전체 배경 — 어두운 네이비 그라데이션 */
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(160deg, #0d1b2a 0%, #1b2a3b 60%, #0a1a25 100%);
      min-height: 100vh;        /* 화면 전체 높이 채우기 */
      display: flex;
      align-items: center;      /* 세로 중앙 정렬 */
      justify-content: center;  /* 가로 중앙 정렬 */
      padding: 20px;
    }

    /* 카드 형태의 메인 컨테이너
       반투명 유리(glass morphism) 효과 적용 */
    .container {
      background: rgba(255,255,255,0.04);  /* 반투명 흰색 배경 */
      backdrop-filter: blur(20px);          /* 배경 흐림 효과 */
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 28px;
      padding: 0;
      width: 100%;
      max-width: 480px;                    /* 최대 너비 제한 */
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      overflow: hidden;                    /* 자식 요소가 둥근 모서리 밖으로 나가지 않도록 */
    }

    /* =============================================
       상단 헤더 영역 (로봇 이미지 + 제목)
    ============================================= */
    .header {
      background: linear-gradient(135deg, #0e2a3a 0%, #0d3347 100%);
      border-bottom: 1px solid rgba(0,200,220,0.15);
      padding: 32px 40px 24px;
      text-align: center;
      position: relative;
    }

    /* 로봇 이미지 — 위아래로 떠다니는 애니메이션 적용 */
    .robot-img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      display: block;
      margin: 0 auto 16px;
      filter: drop-shadow(0 8px 24px rgba(0,200,220,0.4)); /* 청록빛 그림자 */
      animation: float 3s ease-in-out infinite;
    }

    /* 이미지 로드 실패 시 표시되는 이모지 대체 영역
       기본값은 숨김(display:none), JS에서 오류 시 flex로 전환 */
    .robot-placeholder {
      display: none;
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #00c8dc22, #c83c9622);
      border: 2px dashed rgba(0,200,220,0.3);
      border-radius: 16px;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    /* 로봇 이미지 위아래 부유 애니메이션 */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); } /* 8px 위로 이동 */
    }

    /* 페이지 제목 */
    h1 {
      color: #e8f8ff;
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    /* 제목 아래 안내 문구 */
    .subtitle {
      color: rgba(0,200,220,0.65);
      font-size: 0.82rem;
      letter-spacing: 0.3px;
    }

    /* =============================================
       헤더-본문 구분선 — 청록·노랑·마젠타 흐르는 그라데이션
       background-size를 300%로 넓게 설정하고
       position을 이동시켜 흐르는 효과를 만듦
    ============================================= */
    .stripe {
      height: 5px;
      background: linear-gradient(90deg, #00c8dc, #f5c800, #c83c96, #00c8dc, #f5c800, #c83c96);
      background-size: 300% 100%;
      animation: stripeFlow 3s linear infinite;
    }

    /* 그라데이션 바 흐르는 애니메이션 */
    @keyframes stripeFlow {
      0%   { background-position: 0% 0%; }
      100% { background-position: 100% 0%; }
    }

    /* =============================================
       본문 영역 (입력 + 버튼 + 결과)
    ============================================= */
    .body {
      padding: 32px 36px 36px;
    }

    /* 입력 필드 레이블 */
    label {
      display: block;
      color: rgba(255,255,255,0.55);
      font-size: 0.82rem;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase; /* 영문일 경우 대문자로 표시 */
    }

    /* 출석번호 숫자 입력 필드 */
    .num-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,200,220,0.2);
      border-radius: 14px;
      padding: 16px 20px;
      color: #fff;
      font-size: 1.5rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      margin-bottom: 18px;
    }

    /* 입력 필드 포커스(클릭) 상태 — 청록 테두리 + 발광 효과 */
    .num-input:focus {
      border-color: #00c8dc;
      background: rgba(0,200,220,0.07);
      box-shadow: 0 0 0 3px rgba(0,200,220,0.15);
    }

    /* 입력 전 안내 텍스트 색상 */
    .num-input::placeholder { color: rgba(255,255,255,0.2); }

    /* 계산 실행 버튼 */
    .calc-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #00b8cc, #0090a8);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(0,180,200,0.35);
      letter-spacing: 0.3px;
    }

    /* 버튼 호버 시 위로 살짝 이동 + 그림자 강화 */
    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0,180,200,0.55);
    }

    /* 버튼 클릭(누름) 상태 — 제자리로 복귀 */
    .calc-btn:active { transform: translateY(0); }

    /* 오류 메시지 (기본 숨김, JS에서 필요 시 표시) */
    .error-msg {
      color: #ff7b7b;
      text-align: center;
      margin-top: 12px;
      font-size: 0.88rem;
      display: none;
    }

    /* =============================================
       결과 표시 영역
       기본 숨김 — 계산 완료 후 JS에서 표시
    ============================================= */
    .result-area {
      margin-top: 24px;
      display: none;
      animation: fadeIn 0.4s ease; /* 나타날 때 페이드인 */
    }

    /* 결과 영역 나타남 애니메이션 (아래에서 위로 + 투명→불투명) */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 결과 숫자가 표시되는 박스 */
    .result-box {
      background: linear-gradient(135deg, rgba(0,200,220,0.1), rgba(200,60,150,0.08));
      border: 1px solid rgba(0,200,220,0.25);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    /* 결과 박스 오른쪽 상단 장식용 빛 원형 */
    .result-box::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(0,200,220,0.12), transparent 70%);
      pointer-events: none; /* 마우스 이벤트 무시 */
    }

    /* "내 로봇 주행거리" 소제목 */
    .result-label {
      color: rgba(0,200,220,0.7);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    /* 계산 결과 숫자 — 크고 굵게 */
    .result-value {
      color: #7ef0ff;
      font-size: 3.8rem;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
    }

    /* 결과 숫자 아래 단위 표시 (cm) */
    .result-unit {
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    /* 다시 입력하기 버튼 — 투명 배경의 보조 버튼 */
    .reset-btn {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: rgba(255,255,255,0.38);
      font-size: 0.88rem;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
    }

    /* 다시 입력하기 버튼 호버 상태 */
    .reset-btn:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 상단 헤더: 로봇 이미지 + 제목 -->
    <div class="header">
      <!-- robot.png 로드 실패 시 onerror로 이모지 대체 표시 -->
      <img class="robot-img" src="robot.png" alt="로봇"
           onerror="this.style.display='none'; document.querySelector('.robot-placeholder').style.display='flex';">
      <div class="robot-placeholder">🤖</div>
      <h1>로봇 주행거리 계산하기</h1>
      <p class="subtitle">출석번호를 입력하면 내 로봇의 주행거리를 알려드려요</p>
    </div>

    <!-- 헤더와 본문 사이 흐르는 그라데이션 구분선 -->
    <div class="stripe"></div>

    <!-- 본문: 입력 + 버튼 + 결과 -->
    <div class="body">
      <label>출석번호</label>
      <!-- type="number": 숫자만 입력 가능, min="1": 1 미만 입력 방지 -->
      <input class="num-input" type="number" id="numInput" placeholder="예) 15" min="1">

      <!-- 클릭 시 calculate() 함수 실행 -->
      <button class="calc-btn" onclick="calculate()">🚗 주행거리 확인하기</button>

      <!-- 오류 메시지 출력 영역 (기본 숨김) -->
      <p class="error-msg" id="error-msg"></p>

      <!-- 결과 영역 (기본 숨김 → 계산 후 표시) -->
      <div class="result-area" id="result-area">
        <div class="result-box">
          <div class="result-label">내 로봇 주행거리</div>
          <!-- JS가 이 요소에 결과 숫자를 채워 넣음 -->
          <div class="result-value" id="result-value">—</div>
          <div class="result-unit">cm</div>
        </div>

        <!-- 클릭 시 reset() 함수로 초기화 -->
        <button class="reset-btn" onclick="reset()">↺ 다시 입력하기</button>
      </div>
    </div>

  </div>

  <script>
    // =============================================
    // 계산 규칙 테이블
    // 출석번호를 4로 나눈 나머지(0~3)에 따라
    // 주행거리(cm) 값을 결정
    // =============================================
    const RULE = {
      0: 9,   // 나머지 0 → 9cm
      1: 13,  // 나머지 1 → 13cm
      2: 18,  // 나머지 2 → 18cm
      3: 23   // 나머지 3 → 23cm
    };

    // 계산 실행 함수 — 버튼 클릭 또는 Enter 키 입력 시 호출
    function calculate() {
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none'; // 이전 오류 메시지 숨기기

      const raw = document.getElementById('numInput').value.trim();
      const num = parseInt(raw, 10); // 문자열을 10진수 정수로 변환

      // 입력값 유효성 검사: 빈 값, 정수가 아닌 값, 1~29 범위 밖 차단
      if (raw === '' || isNaN(num) || !Number.isInteger(num)) {
        errEl.textContent = '1~29 사이의 자연수를 입력해 주세요.';
        errEl.style.display = 'block';
        return;
      }
      if (num < 1 || num >= 30) {
        errEl.textContent = `출석번호는 1~29 사이여야 합니다. (입력값: ${num})`;
        errEl.style.display = 'block';
        return;
      }

      // 핵심 계산: 출석번호 % 4 → 나머지로 주행거리 결정
      const remainder = num % 4;
      const result = RULE[remainder];

      // 결과 숫자를 화면에 표시
      document.getElementById('result-value').textContent = result;

      // 결과 영역을 보이게 전환 (fadeIn 애니메이션 자동 실행)
      document.getElementById('result-area').style.display = 'block';
    }

    // 초기화 함수 — "다시 입력하기" 버튼 클릭 시 호출
    function reset() {
      document.getElementById('numInput').value = '';           // 입력 필드 비우기
      document.getElementById('result-area').style.display = 'none';  // 결과 숨기기
      document.getElementById('error-msg').style.display = 'none';    // 오류 메시지 숨기기
    }

    // Enter 키로도 계산 실행 가능하도록 이벤트 등록
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  </script>
</body>
</html>
